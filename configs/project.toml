[project]
name = "Price Elasticity"
slug = "price_elasticity"
family = "price_elasticity"
problem_type = "price_elasticity"
business_goal = "Estimate price-demand sensitivity per product and simulate revenue impact of discounts."
primary_metric = "Log-log elasticity coefficient (beta), R-squared, and 95% confidence interval per product"

[data]
train_file = "data/raw/df_ready.csv"
product_column = "name"
price_column = "disc_price"
demand_column = "imp_count"
id_columns = ["name"]
drop_columns = []

[modeling]
min_observations = 12
min_price_points = 3
random_state = 42
model_file = "models/model.joblib"
confidence_level = 0.95
bootstrap_iterations = 500
min_r2 = 0.05

[evaluation]
r2_quality_threshold = 0.10
